<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf8;
      font-family: 'OpenDyslexic', system-ui, sans-serif;
      gap: 2rem;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #3b82f6, #22c55e, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    a {
      font-size: 1.5rem;
      padding: 1rem 2rem;
      background: #3b82f6;
      color: white;
      border-radius: 12px;
      text-decoration: none;
    }
    a:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>👋🏻 Martin !</h1>
  <a href="apps/words/">Orthographe</a>
  <a href="apps/phonemes/">Phonèmes</a>
</body>
</html>
